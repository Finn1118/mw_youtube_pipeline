<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speaker Extraction Graph</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="mx-auto max-w-[1600px] p-4">
      <header class="mb-4 rounded-xl border border-slate-800 bg-slate-900/80 p-4 shadow-lg">
        <h1 class="text-xl font-semibold">Speaker Extraction Library</h1>
        <p class="mt-1 text-sm text-slate-400">
          Analyze YouTube videos and explore detected speakers as connected graph nodes.
        </p>
        <form id="analyzeForm" class="mt-4 flex flex-col gap-3 md:flex-row">
          <input
            id="urlInput"
            type="url"
            required
            placeholder="https://www.youtube.com/watch?v=..."
            class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 outline-none ring-sky-500/40 transition focus:ring"
          />
          <button
            id="analyzeButton"
            type="submit"
            class="rounded-lg bg-sky-500 px-4 py-2 font-medium text-white transition hover:bg-sky-400 disabled:cursor-not-allowed disabled:opacity-50"
          >
            Analyze
          </button>
        </form>
        <p id="statusText" class="mt-3 text-sm text-slate-400">Ready.</p>
      </header>

      <div class="relative grid min-h-[72vh] grid-cols-1 gap-4 lg:grid-cols-[1fr_360px]">
        <section class="relative overflow-hidden rounded-xl border border-slate-800 bg-slate-900/70">
          <svg id="graph" class="h-[72vh] w-full"></svg>
          <div
            id="emptyState"
            class="pointer-events-none absolute inset-0 grid place-items-center text-center text-slate-400"
          >
            <div>
              <p class="text-lg font-medium text-slate-300">No analyzed videos yet</p>
              <p class="mt-1 text-sm">Paste a YouTube URL above to get started.</p>
            </div>
          </div>
          <div id="toast" class="toast hidden"></div>
        </section>

        <aside
          id="detailPanel"
          class="rounded-xl border border-slate-800 bg-slate-900/80 p-4 shadow-lg lg:block"
        >
          <h2 class="text-lg font-semibold">Details</h2>
          <div id="detailContent" class="mt-3 text-sm text-slate-400">
            Select a person or video node to inspect details.
          </div>
        </aside>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
